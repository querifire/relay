      <stop offset="0%" stop-color="#E89E6B" />
      <stop offset="100%" stop-color="#D95B5B" />
    </linearGradient>
  </defs>

  <!-- Minimalist Shield representing Security and Anonymity -->
  <path d="M 256 64 L 416 128 L 416 256 C 416 368 352 448 256 480 C 160 448 96 368 96 256 L 96 128 Z" fill="url(#shieldGrad)" stroke="#FAFAFA" stroke-width="32" stroke-linejoin="round" />
  
